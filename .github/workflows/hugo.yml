---
name: Deploy Hugo theme example site to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.156.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-ci-tools

      - name: Setup Node.js for CI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CI accessibility (a11y) tools
        run: npm install -g serve pa11y-ci

      - name: Cache Ruby Gems
        uses: actions/cache@v4
        with:
          path: ~/.gem
          key: ${{ runner.os }}-gem-asciidoctor

      - name: Install Asciidoctor
        run: sudo gem install asciidoctor

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          cd exampleSite \
          && hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Run Accessibility Audit
        run: |
          serve -p 3000 exampleSite/public &
          sleep 3

          # 1. Create config file to enable warnings AND disable the Chrome sandbox for the CI runner
          echo '{"defaults":{"includeWarnings":true,"chromeLaunchConfig":{"args":["--no-sandbox","--disable-setuid-sandbox"]}}}' > .pa11yci

          # 2. Extract URLs and aggressively strip all variations of base URLs
          grep -h -o '<loc>[^<]*</loc>' $(find exampleSite/public -name "sitemap.xml") \
            | sed 's/<loc>//g; s/<\/loc>//g' \
            | grep -v '\.xml$' \
            | sort -u \
            | sed "s|^${{ steps.pages.outputs.base_url }}||" \
            | sed "s|^https://jwwheeler.gitlab.io/toph-hugo||" \
            | sed -E "s|^http://localhost:[0-9]+/toph-hugo||" \
            | sed "s|^|http://localhost:3000|" > urls.txt

          # 3. Temporarily disable 'exit on error' to capture the pa11y-ci exit code
          set +e
          pa11y-ci --config .pa11yci $(<urls.txt) > pa11y-report.txt 2>&1
          EXIT_CODE=$?
          set -e

          # 4. Display the report in the logs
          cat pa11y-report.txt

          # 5. Fail the build if pa11y-ci returned an error code
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Accessibility errors detected! Review the report for details."
            exit $EXIT_CODE
          else
            echo "No accessibility errors found (warnings may exist)."
          fi

      - name: Publish Accessibility Report to PR Summary
        if: always()
        run: |
          echo "## Accessibility Audit Results" >> $GITHUB_STEP_SUMMARY
          if [ -f pa11y-report.txt ]; then
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat pa11y-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ The accessibility audit did not run or failed to generate a report." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Accessibility Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-audit-report
          path: pa11y-report.txt
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./exampleSite/public

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
