---
name: Deploy Hugo theme example site to GitHub Pages

on:
  push:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.158.0"
      DART_SASS_VERSION: "1.98.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      # --- Tool installation with caching ---
      #
      # Each tool is cached by its version string so upgrades automatically
      # bust the cache. On cache hits, the install step is skipped entirely.

      - name: Cache Hugo CLI
        id: cache-hugo
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/hugo
          key: hugo-${{ env.HUGO_VERSION }}-linux-amd64

      - name: Install Hugo CLI
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          curl --fail --silent --show-error --location \
            --output ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Cache Dart Sass
        id: cache-sass
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/sass
          key: dart-sass-${{ env.DART_SASS_VERSION }}-linux-x64

      - name: Install Dart Sass
        if: steps.cache-sass.outputs.cache-hit != 'true'
        run: |
          curl --fail --silent --show-error --location \
            --output ${{ runner.temp }}/dart-sass.tar.gz \
            https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
          tar -xzf ${{ runner.temp }}/dart-sass.tar.gz -C ${{ runner.temp }}
          sudo cp ${{ runner.temp }}/dart-sass/sass /usr/local/bin/sass

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: .github/package-lock.json

      - name: Install CI tools (pa11y-ci, serve)
        run: npm ci --prefix .github

      - name: Install Asciidoctor
        run: sudo gem install asciidoctor --no-document

      # --- Build and test ---

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-cache-${{ github.run_id }}
          restore-keys: hugo-cache-

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          cd exampleSite \
          && hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Run Accessibility Audit
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
        run: |
          # Rebuild with localhost baseURL so Pa11y's Chromium fetches
          # CSS/JS/images from the local server instead of the remote
          # GitHub Pages deployment (which may have stale assets).
          cd exampleSite \
          && hugo --minify --baseURL http://localhost:3000/ \
          && cd ..

          npx --prefix .github serve -p 3000 exampleSite/public &
          SERVER_PID=$!

          # Wait for the server to be ready (up to 10s)
          for i in $(seq 1 20); do
            curl --silent --fail http://localhost:3000 > /dev/null 2>&1 && break
            sleep 0.5
          done

          # 1. Extract URLs from sitemap
          grep -h -o '<loc>[^<]*</loc>' $(find exampleSite/public -name "sitemap.xml") \
            | sed 's/<loc>//g; s/<\/loc>//g' \
            | grep -v '\.xml$' \
            | sort -u > urls.txt

          # 2. Build pa11y-ci config with URLs embedded to ensure defaults apply
          URLS=$(jq -R -s 'split("\n") | map(select(length > 0))' urls.txt)
          cat > .pa11yci <<EOF
          {
            "defaults": {
              "chromeLaunchConfig": {
                "args": ["--no-sandbox", "--disable-setuid-sandbox"]
              }
            },
            "urls": ${URLS}
          }
          EOF

          # 3. Temporarily disable 'exit on error' to capture the pa11y-ci exit code
          set +e
          npx --prefix .github pa11y-ci --config .pa11yci > pa11y-report.txt 2>&1
          EXIT_CODE=$?
          set -e

          # 4. Clean up the server
          kill $SERVER_PID 2>/dev/null || true

          # 5. Display the report in the logs
          cat pa11y-report.txt

          # 6. Fail the build if pa11y-ci returned an error code
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::Accessibility errors detected! Review the report for details."
            exit $EXIT_CODE
          else
            echo "No accessibility errors found (warnings may exist)."
          fi

      - name: Rebuild with Pages baseURL for deployment
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          cd exampleSite \
          && hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Publish Accessibility Report to PR Summary
        if: always()
        run: |
          echo "## Accessibility Audit Results" >> $GITHUB_STEP_SUMMARY
          if [ -f pa11y-report.txt ]; then
            echo '```text' >> $GITHUB_STEP_SUMMARY
            cat pa11y-report.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ The accessibility audit did not run or failed to generate a report." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Accessibility Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: accessibility-audit-report
          path: pa11y-report.txt
          if-no-files-found: ignore

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./exampleSite/public

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
