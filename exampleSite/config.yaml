---
###############################################################################
#                                                                             #
#                            WEBSITE CONFIGURATION                            #
#                                                                             #
###############################################################################


# --- base website settings ---

title: Example Hugo site with Toph theme
baseURL: https://justwheel.github.io/toph-hugo-theme/
theme: toph
languageCode: en-us
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: false
googleAnalytics: ""


# --- taxonomy and pagination settings ---

taxonomies:
  tag: tags
  category: categories
pagination:
  pagerSize: 10


# --- security settings ---

security:
  exec:
    allow: ['^dart-sass-embedded$', '^git$', '^go$', '^npx$', '^postcss$', '^asciidoctor$']


# --- markup settings ---

markup:
  asciidocExt:
    preserveTOC: true
  highlight:
    style: github


# --- privacy settings ---

privacy:
  googleAnalytics:
    anonymizeIP: true
    respectDoNotTrack: true
  vimeo:
    enableDNT: true
  x:
    enableDNT: true
  youtube:
    privacyEnhanced: true


# --- navigation menu ---

menu:
  nav:
    - identifier: home
      name: home
      url: /
      weight: 10
    - identifier: about
      name: about me
      url: https://kinginstitute.stanford.edu/encyclopedia/clark-septima-poinsette
      weight: 20
    - identifier: blog
      name: blog
      url: /blog/
      weight: 30
    - identifier: categories
      name: categories
      url: /categories/
      parent: blog
      weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      parent: blog
      weight: 20


# --- custom settings ---

params:
  biography:
    name: Septima Poinsette Clark
    tagline: "The mother of the Civil Rights Movement who taught a nation to read, write, and rise"
    gender: Female
    email: septima@example.com
    blog: https://kinginstitute.stanford.edu/encyclopedia/clark-septima-poinsette
    first_online: 1898
    knows_about: [
      "activism",
      "Civil Rights Movement",
      "Martin Luther King Jr.",
      "United States"
    ]
  colors:
    primary: "#8c1515"
    secondary: "#ffffff"
    accent: "#696349"
  description: Honorary biography page of Septima Clark, a Civil Rights Movement pioneer and activist.
  fonts:
    default: Lato
    title: Lobster Two
    header: Patua One
  images:
    - /toph-hugo-theme/img/septima.jpg
  favicon: /toph-hugo-theme/favicon.ico
  git_repo: https://github.com/justwheel/toph-hugo-theme
  taxonomy_exclude: ["footer", "projects"]
  # Are you looking for new opportunities? Set hire_me to "true" if you want your LinkedIn to show on the nav bar and
  # for boilerplate text on how to get in touch.
  hire_me: false
  social:
    # --- Active social media profiles ---
    facebook: KingInstitute
    linkedin: company/the-king-center-for-nonviolent-social-change
    x: MLKInstitute
    # --- Uncomment and set a username/URL to enable ---
    # github: ""
    # gitlab: ""
    # instagram: ""
    # lastfm: ""
    # mastodon: ""       # Use full profile URL (e.g., https://mastodon.social/@user)
    # threads: ""
    # tiktok: ""
    # youtube: ""

  # Footer legal information displayed at the bottom of every page.
  # Override to match your site's license.
  legal:
    license:
      name: "CC BY 4.0"
      url: "https://creativecommons.org/licenses/by/4.0/"
      title: "Creative Commons Attribution 4.0 International"

  # Human-readable date format used across all templates.
  # Uses Go time formatting (https://gohugo.io/functions/time/format/).
  # Default: "2006 January 02" (e.g., "2023 May 09").
  # Other examples: "January 2, 2006", "02 Jan 2006", "2006-01-02".
  date_format: "2006 January 02"

  # --- layout configuration ---
  # These values control how much content appears in specific page layouts.
  # Defaults are tuned for sites with many categories to keep pages scannable
  # without excessive scrolling. Sites with fewer categories or less content
  # may benefit from higher values.
  layouts:
    categories:
      # Number of recent posts shown under each category card. Default: 3.
      recent_posts: 3
      # Maximum character length for plaintext post excerpts. Default: 250.
      excerpt_length: 250


# --- internationalization settings ---

defaultContentLang: en
languages:
  ar:
    disabled: true
    languageDirection: rtl
    languageName: عربي
  en:
    languageName: English
  es:
    disabled: true
    languageName: español
